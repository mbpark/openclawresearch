global
    daemon
    maxconn 256
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout http-request 30s
    retries 3

# Frontend for the application
frontend app_frontend
    bind *:80
    stats enable
    stats uri /haproxy-stats
    stats refresh 10s
    
    # Default backend
    default_backend app_servers
    
    # Health check endpoint
    acl is_health path_beg /health
    use_backend health_check if is_health

# Backend for application servers (with health checks)
backend app_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    # Primary application server
    server primary app:8080 check inter 2s fall 3 rise 2
    
    # Secondary application server for failover testing
    # server secondary app2:8080 check inter 2s fall 3 rise 2

# Backend for health checks (simulates failures)
backend health_check
    option httpchk GET /api/status
    http-check expect status 200
    server health_check_app app:8080 check inter 2s fall 3 rise 2
